<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чат Чикой</title>

  <style>
    body { margin: 0; font-family: Arial; background: #f5f7fb; }

    .back {
      position: fixed; top: 10px; left: 10px; right: 10px;
      padding: 14px; background: white; text-align: center;
      border-radius: 12px; font-weight: bold;
      cursor: pointer;
    }

    .chat {
      margin-top: 70px;
      padding: 10px;
      padding-bottom: 80px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }

    .msg-row { display: flex; margin: 10px 0; }
    .user-row { justify-content: flex-end; }

    .message {
      padding: 12px;
      border-radius: 12px;
      max-width: 70%;
    }

    .user { background: #d2e3ff; }
    .bot {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; padding: 10px; background: #f5f7fb;
    }

    input {
      flex: 1; padding: 12px;
      border-radius: 10px; border: 1px solid #ccc;
    }

    button {
      margin-left: 8px; padding: 12px;
      border: none; border-radius: 10px;
      background: #4caf50; color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="back" onclick="location.href='https://taplink.cc/chikoyapp'">НАЗАД</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Введите сообщение..." />
  <button id="sendBtn">➤</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");

// 🔐 персональный чат (у каждого свой)
let messages = JSON.parse(localStorage.getItem("chat_history")) || [
  {
    role: "system",
    content: "Ты дружелюбный AI-помощник. Отвечай кратко и понятно на русском."
  }
];

// 👉 отрисовка старых сообщений
messages.forEach(msg => {
  if (msg.role === "user") addMessage(msg.content, "user");
  if (msg.role === "assistant") addMessage(msg.content, "bot");
});

function addMessage(text, type) {
  const row = document.createElement("div");
  row.className = "msg-row " + (type === "user" ? "user-row" : "");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  row.appendChild(div);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  messages.push({ role: "user", content: text });
  input.value = "";

  const thinking = document.createElement("div");
  thinking.className = "msg-row";
  thinking.innerHTML = '<div class="message bot">Думаю...</div>';
  chat.appendChild(thinking);

  try {
    const res = await fetch("/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    chat.removeChild(thinking);

    const reply = data.answer;

    addMessage(reply, "bot");

    messages.push({ role: "assistant", content: reply });

    // 💾 сохраняем чат (персонально)
    localStorage.setItem("chat_history", JSON.stringify(messages));

  } catch (e) {
    chat.removeChild(thinking);
    addMessage("Ошибка 😢", "bot");
    console.error(e);
  }
}

button.addEventListener("click", sendMessage);

input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
