<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Чат Чикой</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* 🧠 сайдбар */
.sidebar {
  width: 220px;
  background: #111;
  color: white;
  padding: 10px;
  overflow-y: auto;
}

.chat-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.chat-item.active {
  background: #333;
}

/* ➕ кнопка */
.new-chat {
  background: #4caf50;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 💬 чат */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f5f7fb;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg-row { display: flex; margin: 10px 0; }
.user-row { justify-content: flex-end; }

.message {
  padding: 12px;
  border-radius: 12px;
  max-width: 70%;
}

.user { background: #d2e3ff; }
.bot { background: white; }

.input-area {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="new-chat" onclick="createChat()">+ Новый чат</div>
  <div id="chatList"></div>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Введите..." />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChat = localStorage.getItem("currentChat");

// если нет чатов → создаём первый
if (!currentChat) {
  currentChat = "chat_" + Date.now();
  chats[currentChat] = [
    { role: "system", content: "Ты дружелюбный AI." }
  ];
}

const chatEl = document.getElementById("chat");
const input = document.getElementById("input");
const chatList = document.getElementById("chatList");

// 🔥 сохранить
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
}

// 🔥 ограничение
function limitMessages(messages) {
  const system = messages.find(m => m.role === "system");
  const last = messages.filter(m => m.role !== "system").slice(-10);
  return system ? [system, ...last] : last;
}

// 🧠 рендер чата
function renderChat() {
  chatEl.innerHTML = "";
  const messages = chats[currentChat] || [];

  messages.forEach(m => {
    if (m.role === "user") addMessage(m.content, "user");
    if (m.role === "assistant") addMessage(m.content, "bot");
  });
}

// 🧾 список чатов
function renderChats() {
  chatList.innerHTML = "";

  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.className = "chat-item " + (id === currentChat ? "active" : "");
    div.innerText = id;
    div.onclick = () => {
      currentChat = id;
      save();
      renderChats();
      renderChat();
    };
    chatList.appendChild(div);
  });
}

// ➕ создать чат
function createChat() {
  const id = "chat_" + Date.now();
  chats[id] = [
    { role: "system", content: "Ты дружелюбный AI." }
  ];
  currentChat = id;
  save();
  renderChats();
  renderChat();
}

// 💬 сообщение
function addMessage(text, type) {
  const row = document.createElement("div");
  row.className = "msg-row " + (type === "user" ? "user-row" : "");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  row.appendChild(div);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

// 🚀 отправка
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  let messages = chats[currentChat];
  messages.push({ role: "user", content: text });
  messages = limitMessages(messages);
  chats[currentChat] = messages;

  input.value = "";

  const res = await fetch("/ai", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ messages })
  });

  const data = await res.json();

  addMessage(data.answer, "bot");

  messages.push({ role: "assistant", content: data.answer });
  messages = limitMessages(messages);
  chats[currentChat] = messages;

  save();
}

// init
renderChats();
renderChat();
</script>

</body>
</html>
