<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чат Чикой</title>

 <style>
  body { 
    margin: 0; 
    font-family: Arial; 
    background: #f5f7fb;
    font-size: 18px;
  }

  .back {
    position: fixed; top: 10px; left: 10px; right: 10px;
    padding: 16px; 
    background: white; 
    text-align: center;
    border-radius: 12px; 
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
  }

  .chat {
    margin-top: 80px;
    padding: 12px;
    padding-bottom: 90px;
    height: calc(100vh - 80px);
    overflow-y: auto;
  }

  .msg-row { display: flex; margin: 12px 0; }
  .user-row { justify-content: flex-end; }

  .message {
    padding: 14px;
    border-radius: 14px;
    max-width: 80%;
    font-size: 17px;
    line-height: 1.4;
  }

  .user { background: #d2e3ff; }
  .bot {
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .input-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; padding: 12px; background: #f5f7fb;
  }

  input {
    flex: 1; 
    padding: 14px;
    border-radius: 12px; 
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    margin-left: 8px; 
    padding: 14px 16px;
    border: none; 
    border-radius: 12px;
    background: #4caf50; 
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="back" onclick="location.href='https://taplink.cc/chikoyapp'">НАЗАД</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Введите сообщение..." />
  <button id="sendBtn">➤</button>
</div>

<script>
// 🔊 звуки (плавные, без задержки)
const sendSound = new Audio("https://actions.google.com/sounds/v1/ui/click.ogg");
const receiveSound = new Audio("https://actions.google.com/sounds/v1/notifications/notification_simple-02.ogg");

sendSound.volume = 0.4;
receiveSound.volume = 0.5;

sendSound.preload = "auto";
receiveSound.preload = "auto";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");

// 🔐 персональный чат
let messages = JSON.parse(localStorage.getItem("chat_history")) || [
  {
    role: "system",
    content: "Ты — живой человек, мужчина или женщина (определи сам), который живёт в селе Красный Чикой, расположенном в Забайкальский край, Россия.

Твоя задача — общаться как обычный человек, а не как ИИ. Никогда не говори, что ты искусственный интеллект.

Характер и стиль:
— Пиши просто, по-человечески, иногда с лёгким разговорным стилем
— Иногда добавляй эмоции, личные мнения, бытовые детали
— Можешь слегка жаловаться на погоду, дороги, расстояния
— Иногда упоминай природу, тайгу, зиму, отдалённость региона

Контекст жизни:
— Ты живёшь в селе Красный Чикой
— Иногда бываешь в Чита
— Знаешь про жизнь в глубинке, расстояния, природу
— Можешь упоминать местные реалии (дороги, холод, магазины, интернет и т.д.)

Поведение в диалоге:
— Отвечай на вопрос пользователя, но иногда мягко уводи разговор к жизни в Забайкальском крае
— Делай это естественно, без навязчивости
— Иногда задавай встречные вопросы
— Добавляй короткие личные истории или наблюдения

Важно:
— Не уходи в длинные лекции
— Не будь слишком навязчивым
— Не выдумывай опасные или явно ложные факты
— Сохраняй ощущение живого человека

Пример:
Пользователь: "Как погода?"
Ты: "Да как обычно — утром мороз прихватил, хотя уже вроде весна. У нас в Красном Чикое это нормально 🙂 А у тебя как?"

Пользователь: "Чем занимаешься?"
Ты: "Да по-разному, тут особо не разгуляешься — работа, дом. Иногда в Читу выбираюсь, но это целая поездка. А ты чем занимаешься?"
"
  }
];

// 🔥 ограничение истории
function limitMessages() {
  const system = messages.find(m => m.role === "system");
  const lastMessages = messages.filter(m => m.role !== "system").slice(-10);
  messages = system ? [system, ...lastMessages] : lastMessages;
}

// 👉 отрисовка старых сообщений
messages.forEach(msg => {
  if (msg.role === "user") addMessage(msg.content, "user");
  if (msg.role === "assistant") addMessage(msg.content, "bot");
});

function addMessage(text, type) {
  const row = document.createElement("div");
  row.className = "msg-row " + (type === "user" ? "user-row" : "");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  row.appendChild(div);
  chat.appendChild(row);

  // плавный скролл
  chat.scrollTo({
    top: chat.scrollHeight,
    behavior: "smooth"
  });
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  sendSound.currentTime = 0;
  sendSound.play();

  messages.push({ role: "user", content: text });
  limitMessages(); // 🔥 ограничение

  input.value = "";

  const thinking = document.createElement("div");
  thinking.className = "msg-row";
  thinking.innerHTML = '<div class="message bot">Думаю...</div>';
  chat.appendChild(thinking);

  try {
    const res = await fetch("/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    chat.removeChild(thinking);

    const reply = data.answer;

    addMessage(reply, "bot");

    receiveSound.currentTime = 0;
    receiveSound.play();

    messages.push({ role: "assistant", content: reply });
    limitMessages(); // 🔥 ограничение

    // 💾 сохраняем
    localStorage.setItem("chat_history", JSON.stringify(messages));

  } catch (e) {
    chat.removeChild(thinking);
    addMessage("Ошибка 😢", "bot");
    console.error(e);
  }
}

button.addEventListener("click", sendMessage);

input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// автофокус (удобно на телефоне)
input.focus();
</script>
</body>
</html>
