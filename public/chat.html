<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
.message {
  max-width: 70%;
  padding: 10px 14px;
  margin: 8px;
  border-radius: 12px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.3s ease forwards;
}

.user {
  background: #007bff;
  color: white;
  margin-left: auto;
  animation: slideRight 0.3s ease forwards;
}

.bot {
  background: #e5e5ea;
  color: black;
  margin-right: auto;
  animation: slideLeft 0.3s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideRight {
  from {
    opacity: 0;
    transform: translateX(40px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slideLeft {
  from {
    opacity: 0;
    transform: translateX(-40px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.chat {
  max-width: 500px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #007bff;
  color: white;
  margin-left: auto;
}

.bot {
  background: #e0e0e0;
}

.input {
  display: flex;
  padding: 10px;
  background: white;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
}
</style>
</head>

<body>

<div class="chat">
  <div class="messages" id="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Напиши сообщение..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value;

  if (!message) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${message}</div>`;

  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
