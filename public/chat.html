<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Чат Чикой</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* КНОПКА НАЗАД */
.back {
  position: fixed;
  top: 10px;
  left: 10px;
  right: 10px;
  padding: 15px;
  background: #1f1f1f;
  text-align: center;
  border-radius: 12px;
  text-transform: uppercase;
  font-weight: bold;
  cursor: pointer;
  z-index: 1000;
}

/* ЧАТ */
.chat {
  margin-top: 80px;
  padding: 10px;
}

.message {
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  max-width: 80%;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #2a2a2a;
  margin-left: auto;
}

.bot {
  background: #1a1a1a;
}

/* ВВОД */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  padding: 10px;
  background: #0f0f0f;
}

input {
  flex: 1;
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #4caf50;
  color: white;
}

/* АНИМАЦИЯ */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">НАЗАД</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Введите сообщение..." />
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

function goBack() {
  window.location.href = "https://taplink.cc/chikoyapp";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  addMessage(data.reply, "bot");
}
</script>

</body>
</html>
