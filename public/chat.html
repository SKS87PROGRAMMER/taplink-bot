<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат Чикой</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5ddd5;
  font-size: 18px;
}

/* 🔝 HEADER */
#header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 10px;
  background: #d8ccc2;
  z-index: 1000;
}

.back-btn {
  display: block;
  width: 100%;
  text-align: center;
  background: #e6dad0;
  padding: 14px;
  border-radius: 14px;
  text-decoration: none;
  color: black;
  font-weight: bold;
  text-transform: uppercase;
}

/* чат */
#chat {
  margin-top: 80px;
  margin-bottom: 80px;
  padding: 15px;
}

/* сообщения */
.row {
  display: flex;
  margin: 6px 0;
}

.user-row { justify-content: flex-end; }

.bubble {
  max-width: 75%;
  padding: 12px;
  border-radius: 16px;
  white-space: pre-line;
}

.user { background: #0088cc; color: white; }
.bot { background: white; }

/* карточки */
.card {
  background: white;
  border-radius: 14px;
  padding: 12px;
  margin: 8px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card-title { font-weight: bold; }
.card-desc { font-size: 14px; margin: 5px 0; }

.card-buttons {
  display: flex;
  gap: 8px;
}

.card-buttons a {
  flex: 1;
  text-align: center;
  background: #0088cc;
  color: white;
  padding: 8px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
}

/* ввод */
#inputArea {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

#input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 10px;
  background: #0088cc;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div id="header">
  <a href="https://taplink.cc/chikoyapp" class="back-btn">⬅️ НАЗАД</a>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Напиши сообщение..." />
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

function createMessage(text, sender) {
  const row = document.createElement("div");
  row.className = "row " + sender + "-row";

  const bubble = document.createElement("div");
  bubble.className = "bubble " + sender;
  bubble.textContent = text;

  row.appendChild(bubble);
  chat.appendChild(row);
}

function renderCards(categories) {
  categories.forEach(cat => {
    const title = document.createElement("div");
    title.textContent = "📂 " + cat.category;
    title.style.fontWeight = "bold";
    title.style.marginTop = "10px";

    chat.appendChild(title);

    cat.companies.forEach(c => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="card-title">${c.name}</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-buttons">
          <a href="tel:${c.phone}">📞</a>
          <a href="${c.site}" target="_blank">🌐</a>
        </div>
      `;

      chat.appendChild(card);
    });
  });

  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  createMessage(text, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  if (data.type === "cards") {
    renderCards(data.data);
  } else {
    createMessage(data.reply, "bot");
  }
}

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
