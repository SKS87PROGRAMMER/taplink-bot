<h1>NEW VERSION</h1>
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5ddd5;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* чат */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

/* строка сообщения */
.row {
  display: flex;
  align-items: flex-end;
  margin: 5px 0;
}

/* бот слева */
.bot-row {
  justify-content: flex-start;
}

/* пользователь справа */
.user-row {
  justify-content: flex-end;
}

/* аватар */
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #ccc;
  margin: 0 8px;
}

/* пузырь */
.bubble {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 16px;
  position: relative;
  animation: fadeIn 0.25s ease;
}

/* пользователь */
.user {
  background: #0088cc;
  color: white;
  border-bottom-right-radius: 4px;
}

/* бот */
.bot {
  background: white;
  color: black;
  border-bottom-left-radius: 4px;
}

/* хвостик */
.user::after {
  content: "";
  position: absolute;
  right: -6px;
  bottom: 0;
  border-left: 6px solid #0088cc;
  border-top: 6px solid transparent;
}

.bot::after {
  content: "";
  position: absolute;
  left: -6px;
  bottom: 0;
  border-right: 6px solid white;
  border-top: 6px solid transparent;
}

/* анимация */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ввод */
#inputArea {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

#input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 10px;
  border: none;
  background: #0088cc;
  color: white;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
}

/* typing dots */
.typing {
  display: flex;
  gap: 4px;
}

.dot {
  width: 6px;
  height: 6px;
  background: gray;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0; }
  40% { opacity: 1; }
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Сообщение..." />
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

function createMessage(text, sender) {
  const row = document.createElement("div");
  row.classList.add("row", sender + "-row");

  const avatar = document.createElement("div");
  avatar.classList.add("avatar");

  const bubble = document.createElement("div");
  bubble.classList.add("bubble", sender);
  bubble.textContent = text;

  if (sender === "bot") {
    row.appendChild(avatar);
    row.appendChild(bubble);
  } else {
    row.appendChild(bubble);
    row.appendChild(avatar);
  }

  chat.appendChild(row);
  row.scrollIntoView({ behavior: "smooth" });

  return bubble;
}

function showTyping() {
  const row = document.createElement("div");
  row.classList.add("row", "bot-row");

  const avatar = document.createElement("div");
  avatar.classList.add("avatar");

  const bubble = document.createElement("div");
  bubble.classList.add("bubble", "bot");

  const typing = document.createElement("div");
  typing.classList.add("typing");

  for (let i = 0; i < 3; i++) {
    const dot = document.createElement("div");
    dot.classList.add("dot");
    typing.appendChild(dot);
  }

  bubble.appendChild(typing);
  row.appendChild(avatar);
  row.appendChild(bubble);

  chat.appendChild(row);
  row.scrollIntoView({ behavior: "smooth" });

  return row;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  createMessage(text, "user");
  input.value = "";

  const typingRow = showTyping();

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  typingRow.remove();

  typeText(data.reply, "bot");
}

function typeText(text, sender) {
  const bubble = createMessage("", sender);

  let i = 0;

  function typing() {
    if (i < text.length) {
      bubble.textContent += text[i];
      i++;
      setTimeout(typing, 15);
    }
  }

  typing();
}
</script>

</body>
</html>
