<script>
const chat = document.getElementById("chat");

// 🔐 генерим user_id
let userId = localStorage.getItem("user_id");
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("user_id", userId);
}

function goBack() {
  window.location.href = "https://taplink.cc/chikoyapp";
}

function addMessage(text, type, buttons = []) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  if (buttons && buttons.length > 0) {
    const btnWrap = document.createElement("div");
    btnWrap.style.marginTop = "10px";

    buttons.forEach(b => {
      const btn = document.createElement("button");
      btn.innerText = b.text;
      btn.style.marginRight = "5px";
      btn.style.marginTop = "5px";
      btn.onclick = () => window.open(b.action, "_blank");
      btnWrap.appendChild(btn);
    });

    div.appendChild(btnWrap);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return div;
}

// ✅ ИСПРАВЛЕННАЯ ИСТОРИЯ
async function loadHistory() {
  try {
    const res = await fetch("/api/history?user_id=" + userId);
    const data = await res.json();

    if (!Array.isArray(data)) return;

    data.forEach(m => {
      if (m.role === "user") {
        addMessage(m.content, "user");
      } else if (m.role === "assistant") {
        addMessage(m.content, "bot");
      }
    });
  } catch (err) {
    console.error("Ошибка загрузки истории:", err);
  }
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = addMessage("печатает...", "bot typing");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text, user_id: userId })
    });

    const data = await res.json();

    typing.remove();

    addMessage(data.reply || "Ошибка ответа", "bot", data.buttons || []);
  } catch (err) {
    typing.remove();
    addMessage("Ошибка соединения с сервером", "bot");
    console.error(err);
  }
}

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

loadHistory();
</script>
