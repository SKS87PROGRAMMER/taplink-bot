<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 70%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 12px;
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

.user {
  background: #007bff;
  color: white;
  align-self: flex-end;
  animation: slideRight 0.3s forwards;
}

.bot {
  background: #e5e5ea;
  color: black;
  align-self: flex-start;
  animation: slideLeft 0.3s forwards;
}

.typing {
  font-style: italic;
  opacity: 0.6;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes slideRight {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes slideLeft {
  from { transform: translateX(-40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

#inputArea {
  display: flex;
  padding: 10px;
  background: white;
}

#input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Напиши сообщение..." />
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, sender, isTyping = false) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);

  if (isTyping) {
    msg.classList.add("typing");
  }

  msg.textContent = text;
  chat.appendChild(msg);

  msg.scrollIntoView({ behavior: "smooth" });
  return msg;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // индикатор "печатает..."
  const typingMsg = addMessage("печатает...", "bot", true);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  typingMsg.remove();

  typeText(data.reply, "bot");
}

// эффект печати как в ChatGPT
function typeText(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  chat.appendChild(msg);

  let i = 0;

  function typing() {
    if (i < text.length) {
      msg.textContent += text.charAt(i);
      i++;
      setTimeout(typing, 15);
    }
  }

  typing();
}
</script>

</body>
</html>
