<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чат Чикой</title>

  <style>
    body { margin: 0; font-family: Arial; background: #f5f7fb; }

    .back {
      position: fixed; top: 10px; left: 10px; right: 10px;
      padding: 14px; background: white; text-align: center;
      border-radius: 12px; font-weight: bold;
      cursor: pointer;
    }

    .chat {
      margin-top: 70px;
      padding: 10px;
      padding-bottom: 80px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }

    .msg-row { display: flex; margin: 10px 0; }
    .user-row { justify-content: flex-end; }

    .message {
      padding: 12px;
      border-radius: 12px;
      max-width: 70%;
    }

    .user { background: #d2e3ff; }
    .bot {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; padding: 10px; background: #f5f7fb;
    }

    input {
      flex: 1; padding: 12px;
      border-radius: 10px; border: 1px solid #ccc;
    }

    button {
      margin-left: 8px; padding: 12px;
      border: none; border-radius: 10px;
      background: #4caf50; color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="back" onclick="location.href='https://taplink.cc/chikoyapp'">НАЗАД</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Введите сообщение..." />
  <button id="sendBtn">➤</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabase = window.supabase.createClient(
    "https://onjcxdjricgdfetwxnmg.supabase.co",
    "sb_publishable_bouNvhdKU7BF_9Y6_HMINg_FvVTtk4b"
  );

  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const button = document.getElementById("sendBtn");

  function addMessage(text, type) {
    const row = document.createElement("div");
    row.className = "msg-row " + (type === "user" ? "user-row" : "");

    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    row.appendChild(div);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function normalize(text) {
    return text
      .toLowerCase()
      .replace(/[^\w\sа-яё]/gi, "")
      .split(" ")
      .filter(w => w.length > 2);
  }

  function scoreMatch(words, item) {
    let score = 0;

    const question = item.question.toLowerCase();
    const tags = (item.tags || []).join(" ").toLowerCase();

    words.forEach(w => {
      if (question.includes(w)) score += 2;
      if (tags.includes(w)) score += 1;
    });

    return score;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
      const words = normalize(text);

      if (words.length === 0) {
        addMessage("Напиши подробнее 🙏", "bot");
        return;
      }

      // 🔥 берём ВСЕ FAQ
      const { data, error } = await supabase
        .from("faq")
        .select("*");

      if (error) {
        console.error(error);
        addMessage("Ошибка базы 😢", "bot");
        return;
      }

      // 🧠 считаем лучший ответ
      let best = null;
      let bestScore = 0;

      data.forEach(item => {
        const s = scoreMatch(words, item);
        if (s > bestScore) {
          bestScore = s;
          best = item;
        }
      });

      if (best && bestScore > 0) {
        addMessage(best.answer, "bot");
      } else {
        addMessage("Я пока не знаю 🤔, но скоро научусь!", "bot");

        // 💾 сохраняем вопрос
        await supabase
          .from("unknown_questions")
          .insert([{ text }]);
      }

    } catch (e) {
      console.error(e);
      addMessage("Ошибка 😢", "bot");
    }
  }

  button.addEventListener("click", sendMessage);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

});
</script>

</body>
</html>
