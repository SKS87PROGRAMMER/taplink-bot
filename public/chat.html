<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чат Чикой</title>

  <style>
    body { margin: 0; font-family: Arial; background: #f5f7fb; }

    .back {
      position: fixed; top: 10px; left: 10px; right: 10px;
      padding: 14px; background: white; text-align: center;
      border-radius: 12px; font-weight: bold;
      cursor: pointer;
    }

    .chat {
      margin-top: 70px;
      padding: 10px;
      padding-bottom: 80px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }

    .msg-row { display: flex; margin: 10px 0; }
    .user-row { justify-content: flex-end; }

    .message {
      padding: 12px;
      border-radius: 12px;
      max-width: 70%;
    }

    .user { background: #d2e3ff; }
    .bot {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; padding: 10px; background: #f5f7fb;
    }

    input {
      flex: 1; padding: 12px;
      border-radius: 10px; border: 1px solid #ccc;
    }

    button {
      margin-left: 8px; padding: 12px;
      border: none; border-radius: 10px;
      background: #4caf50; color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="back" onclick="location.href='https://taplink.cc/chikoyapp'">НАЗАД</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Введите сообщение..." />
  <button id="sendBtn">➤</button>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabase = window.supabase.createClient(
    "https://onjcxdjricgdfetwxnmg.supabase.co",
    "sb_publishable_bouNvhdKU7BF_9Y6_HMINg_FvVTtk4b" // вставь свой ключ
  );

  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const button = document.getElementById("sendBtn");

  function addMessage(text, type) {
    const row = document.createElement("div");
    row.className = "msg-row " + (type === "user" ? "user-row" : "");

    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    row.appendChild(div);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
      const { data, error } = await supabase
        .from("faq")
        .select("*")
        const words = text.toLowerCase().split(" ");

const { data } = await supabase
  .from("faq")
  .select("*")
  .or(
    words.map(w => `question.ilike.%${w}%`).join(",")
  )
  .limit(1);
        .limit(1);

      if (error) {
        console.error(error);
        addMessage("Ошибка базы 😢", "bot");
        return;
      }

      if (data && data.length > 0) {
        addMessage(data[0].answer, "bot");
      } else {
        addMessage("Не нашёл ответ 😕", "bot");
      }

    } catch (e) {
      console.error(e);
      addMessage("Ошибка ответа 😢", "bot");
    }
  }

  button.addEventListener("click", sendMessage);
  input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
  });

});
</script>

</body>
</html>
