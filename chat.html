<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>

<input id="msg" placeholder="Спроси что-нибудь..." />
<button onclick="send()">Отправить</button>

<div id="chat"></div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value;

  if (!message) return;

  const res = await fetch("https://taplink-bot-production.up.railway.app/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  document.getElementById("chat").innerHTML += 
    "<p><b>Ты:</b> " + message + "</p>" +
    "<p><b>Бот:</b> " + data.reply + "</p>";

  input.value = "";
}
</script>

</body>
</html>
